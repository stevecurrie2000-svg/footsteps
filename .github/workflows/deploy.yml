name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for unsubstituted placeholders
        run: |
          if grep -rIn \
               --include='*.astro' \
               --include='*.ts' \
               --include='*.js' \
               --include='*.tsx' \
               --include='*.jsx' \
               --include='*.css' \
               --include='*.html' \
               -E 'YOUR_[A-Z_]+_HERE|TODO_RUNTIME_KEY|REPLACE_ME' src/; then
            echo "::error::Unsubstituted placeholder found in src/ — fix before deploying"
            exit 1
          fi

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json
